<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authentification — Contrôle Qualité</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
  body{margin:0;font-family:system-ui,sans-serif;background:#f0f4f8;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .box{background:#fff;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.12);padding:40px;text-align:center;width:340px;max-width:95vw}
  .badge{width:50px;height:50px;border-radius:12px;background:linear-gradient(135deg,#0369a1,#075985);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;margin:0 auto 20px}
  h1{font-size:18px;font-weight:700;margin:0 0 6px}
  p{color:#64748b;font-size:13px;margin:0 0 24px}
  .spinner{width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#0369a1;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  .status{font-size:13px;color:#64748b;margin-top:16px}
</style>
</head>
<body>
<div class="box">
  <div class="badge">APR</div>
  <h1>Contrôle Qualité</h1>
  <p>Paramètres de Production</p>
  <div class="spinner"></div>
  <div class="status" id="status">Vérification en cours...</div>
</div>
<script>
  const SITE = 'https://product-quality-review.netlify.app';
  const status = document.getElementById('status');

  // Lire le hash immédiatement avant toute modification
  const rawHash = window.location.hash;
  console.log('Hash detected:', rawHash);

  const hasInvite       = rawHash.includes('invite_token=');
  const hasRecovery     = rawHash.includes('recovery_token=');
  const hasConfirmation = rawHash.includes('confirmation_token=');
  const hasAnyToken     = hasInvite || hasRecovery || hasConfirmation;

  if (hasInvite)       status.textContent = 'Activation de votre compte...';
  else if (hasRecovery) status.textContent = 'Réinitialisation du mot de passe...';

  window.netlifyIdentity.on('init', user => {
    console.log('Identity init, user:', user);
    if (user) {
      status.textContent = 'Connecté ! Redirection...';
      setTimeout(() => { window.location.href = SITE; }, 800);
    } else if (!hasAnyToken) {
      // Pas de token, pas connecté → aller à l'app (qui ouvrira le login)
      window.location.href = SITE;
    } else {
      // Token présent → ouvrir le widget pour définir le mot de passe
      status.textContent = 'Ouverture du formulaire...';
      window.netlifyIdentity.open();
    }
  });

  window.netlifyIdentity.on('login', () => {
    status.textContent = 'Connecté ! Redirection vers l\'application...';
    setTimeout(() => { window.location.href = SITE; }, 1000);
  });

  window.netlifyIdentity.on('error', err => {
    console.error('Identity error:', err);
    status.textContent = 'Erreur : ' + (err.message || err);
    status.style.color = '#dc2626';
  });

  window.netlifyIdentity.init({ APIUrl: SITE + '/.netlify/identity' });
</script>
</body>
</html>
