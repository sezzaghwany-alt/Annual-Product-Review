<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authentification — Contrôle Qualité</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
  body{margin:0;font-family:'DM Sans',system-ui,sans-serif;background:#f0f4f8;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .box{background:#fff;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.12);padding:40px;text-align:center;width:340px;max-width:95vw}
  .badge{width:50px;height:50px;border-radius:12px;background:linear-gradient(135deg,#0369a1,#075985);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;margin:0 auto 20px}
  h1{font-size:18px;font-weight:700;margin:0 0 6px}
  p{color:#64748b;font-size:13px;margin:0 0 24px}
  .spinner{width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#0369a1;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  .status{font-size:13px;color:#64748b;margin-top:16px}
</style>
</head>
<body>
<div class="box">
  <div class="badge">APR</div>
  <h1>Contrôle Qualité</h1>
  <p>Paramètres de Production</p>
  <div class="spinner"></div>
  <div class="status" id="status">Vérification en cours...</div>
</div>

<script>
  const status = document.getElementById('status');

  // Lire le hash AVANT que quoi que ce soit ne le modifie
  const hash = window.location.hash;
  const hasToken = hash.includes('invite_token=') 
                || hash.includes('recovery_token=') 
                || hash.includes('confirmation_token=');

  if (hasToken) {
    status.textContent = 'Activation du compte...';
  }

  window.netlifyIdentity.on('init', user => {
    if (user) {
      // Déjà connecté → aller à l'app
      status.textContent = 'Connecté ! Redirection...';
      setTimeout(() => { window.location.href = '/'; }, 800);
    } else if (!hasToken) {
      // Pas de token, pas connecté → aller à l'app (qui ouvrira le login)
      window.location.href = '/';
    }
    // Si hasToken → le widget ouvre automatiquement le formulaire de mot de passe
  });

  window.netlifyIdentity.on('login', user => {
    status.textContent = `Bienvenue ! Redirection vers l'application...`;
    setTimeout(() => { window.location.href = '/'; }, 1000);
  });

  window.netlifyIdentity.on('error', err => {
    status.textContent = 'Erreur : ' + err.message;
    status.style.color = '#dc2626';
  });

  // Ouvrir le widget si token présent
  window.netlifyIdentity.init();
  if (hasToken) {
    // Petit délai pour laisser le widget parser le hash
    setTimeout(() => window.netlifyIdentity.open(), 300);
  }
</script>
</body>
</html>
