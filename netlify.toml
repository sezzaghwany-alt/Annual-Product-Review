[build]
  publish = "."

# Redirige les tokens d'invitation/reset vers la page auth légère
[[redirects]]
  from = "/#invite_token=*"
  to = "/auth.html#invite_token=:splat"
  status = 301

[[redirects]]
  from = "/#recovery_token=*"
  to = "/auth.html#recovery_token=:splat"
  status = 301

[[redirects]]
  from = "/#confirmation_token=*"
  to = "/auth.html#confirmation_token=:splat"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
